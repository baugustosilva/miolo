<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index,follow">
  <title>miolo</title>
  <meta name="description" content="miolo. Conteudo visual para gastronomia, produto e hospitalidade.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="miolo">
  <meta property="og:title" content="miolo">
  <meta property="og:description" content="Conteudo visual para gastronomia, produto e hospitalidade.">
  <meta property="og:url" content="https://miolo.online/">
  <meta property="og:image" content="https://miolo.online/img/brand/miolo-lockup.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="miolo - conteudo visual para gastronomia, produto e hospitalidade">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="miolo">
  <meta name="twitter:description" content="Conteudo visual para gastronomia, produto e hospitalidade.">
  <meta name="twitter:image" content="https://miolo.online/img/brand/miolo-lockup.svg">
  <link rel="icon" type="image/svg+xml" href="img/brand/miolo-symbol.svg">
  <style>
    :root {
      --paper: #fafafa;
      --ink: #1d1d1b;
      --muted: rgba(29, 29, 27, 0.72);
      --strip-gap: 2px;
      --outer-gutter: 12px;
      --page-side-margin: 180px;
      --meta-size: 9px;
      --meta-track: 0.08em;
      --edge-band: 42px;
      --hover-scale: 1.5;
      --lateral-gap: 4px;
      --miolo-grid-scale: 0.25;
      --lateral-tile-size: calc((100vh - (var(--edge-band) * 2)) * var(--miolo-grid-scale));
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--paper);
      overflow: hidden;
    }

    body {
      position: relative;
      font-family: Helvetica, Arial, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .edge-meta {
      position: fixed;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 12px var(--outer-gutter);
      font-size: var(--meta-size);
      font-weight: 700;
      letter-spacing: var(--meta-track);
      text-transform: uppercase;
      line-height: 1;
      color: var(--ink);
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .edge-meta--top {
      top: 0;
    }

    .edge-meta--bottom {
      bottom: 0;
      align-items: flex-end;
    }

    .edge-meta__center,
    .edge-meta__right,
    .edge-meta__left {
      display: flex;
      gap: 14px;
      align-items: center;
      white-space: nowrap;
    }

    .edge-meta__center {
      justify-content: center;
      flex: 1 1 auto;
    }

    .edge-meta__brand {
      width: clamp(116px, 15vw, 210px);
      height: auto;
      filter: brightness(0) saturate(100%);
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .edge-meta__left,
    .edge-meta__right {
      flex: 0 0 auto;
    }

    .edge-meta__bottom-note {
      max-width: 180px;
      white-space: normal;
      line-height: 1.16;
      text-align: left;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--edge-band) 0;
      overflow: hidden;
    }

    .strip-shell {
      width: calc(100vw - (var(--page-side-margin) * 2));
      min-height: calc(100vh - (var(--edge-band) * 2));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      clip-path: inset(-100vh 0 -100vh 0);
    }

    .strip-rows {
      position: relative;
      width: 100%;
      height: var(--lateral-tile-size);
      overflow: visible;
      cursor: ew-resize;
      user-select: none;
    }

    .lateral-track {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      height: 100%;
      width: max-content;
      min-width: 100%;
      overflow: visible;
    }

    .lateral-row-track {
      display: flex;
      align-items: stretch;
      gap: var(--lateral-gap);
      height: 100%;
      width: max-content;
      overflow: visible;
      will-change: transform;
    }

    .lateral-segment {
      display: flex;
      align-items: stretch;
      gap: var(--lateral-gap);
      height: 100%;
      width: max-content;
      flex: none;
      overflow: visible;
    }

    .strip-item {
      position: relative;
      display: flex;
      align-items: stretch;
      flex: 0 0 auto;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ecece8;
      width: var(--item-width, 120px);
      height: 100%;
      flex-basis: var(--item-width, 120px);
      transform-origin: center center;
      isolation: isolate;
      will-change: transform;
      transition: transform 0.55s ease;
    }

    .strip-item img {
      width: auto;
      height: 100%;
      max-width: none;
      object-fit: contain;
      object-position: center;
      filter: grayscale(1) brightness(0.98) contrast(1.02);
      transform: scale(1.002);
      transition: filter 0.35s ease;
    }

    .strip-item:hover img {
      filter: grayscale(0) brightness(1) contrast(1);
    }

    .hover-title {
      position: fixed;
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      transform: translate3d(-50%, 8px, 0);
      transition: opacity 0.18s ease, transform 0.18s ease;
      text-align: center;
      overflow: visible;
    }

    .hover-title__char,
    .hover-title__space {
      display: inline-flex;
      justify-content: center;
      flex: 0 0 auto;
    }

    .hover-title__space {
      width: 1.2em;
    }

    .hover-title.is-visible {
      opacity: 1;
      transform: translate3d(-50%, 0, 0);
    }

    @media (max-width: 960px) {
      :root {
        --outer-gutter: 10px;
        --page-side-margin: 14px;
        --edge-band: 40px;
        --lateral-gap: 0px;
      }

      .edge-meta__right,
      .edge-meta__left {
        gap: 10px;
      }

      .edge-meta__brand {
        width: clamp(108px, 20vw, 176px);
      }
    }

    @media (max-width: 640px) {
      :root {
        --outer-gutter: 8px;
        --page-side-margin: 10px;
        --meta-size: 8px;
        --edge-band: 34px;
        --lateral-gap: 0px;
        --miolo-grid-scale: 0.62;
      }

      .edge-meta__bottom-note {
        max-width: 124px;
      }

      .edge-meta__brand {
        width: clamp(92px, 28vw, 132px);
      }

      .strip-rows {
        cursor: default;
        overflow: visible;
        width: min(92vw, 520px);
        height: auto;
      }

      .lateral-track,
      .lateral-row-track,
      .lateral-segment {
        display: block;
        width: 100%;
        height: auto;
      }

      .strip-item {
        width: 100%;
        height: auto;
        margin-bottom: 20px;
      }

      .strip-item img {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <header class="edge-meta edge-meta--top" aria-hidden="true">
    <div class="edge-meta__left">miolo online</div>
    <div class="edge-meta__center">
      <img class="edge-meta__brand" src="img/brand/marca-p-clean.svg" alt="miolo">
    </div>
    <div class="edge-meta__right">
      <span>gastro</span>
      <span>produto</span>
      <span>stay</span>
    </div>
  </header>

  <main class="stage">
    <section class="strip-shell" aria-label="Selecao visual da miolo">
      <div class="strip-rows" id="stripRows"></div>
    </section>
    <div class="hover-title" id="hoverTitle" aria-hidden="true"></div>
  </main>

  <footer class="edge-meta edge-meta--bottom" aria-hidden="true">
    <div class="edge-meta__left">salvador · bh · sp · rio · floripa</div>
    <div class="edge-meta__center">(miolo)</div>
    <div class="edge-meta__right">
      <span class="edge-meta__bottom-note">explore feed<br>conteudo, imagem<br>e presenca.</span>
      <span>about</span>
      <span>index</span>
    </div>
  </footer>

  <script>
    (() => {
      const stripRows = document.getElementById('stripRows');
      const hoverTitle = document.getElementById('hoverTitle');

      const stripImages = [
        'img/grid/20181111-Copa-Cozinha-00006.webp',
        'img/grid/20191009-Curamagoa-7941015.webp',
        'img/grid/20191204-Cozinha-da-Vo-Ana-0004.webp',
        'img/grid/20200723-Forno-da-Saudade-0011.webp',
        'img/grid/20210528-Capim-Rosa-4842.webp',
        'img/grid/20211126-Capim-Rosa-2656.webp',
        'img/grid/20220901-Enquanto0279.webp',
        'img/grid/20230613-Juramento-202-2626.webp',
        'img/grid/20230807-Tapecaria-Aveia-3258.webp',
        'img/grid/20231006-Distribuidora-Goitacazes-4529.webp',
        'img/grid/20231207-Cozinha-Tupis-5865.webp',
        'img/grid/20240228-Casinha-do-Jura.webp',
        'img/grid/20240418-Tapecaria-Aveia-9927.webp',
        'img/grid/20240419-Guaramao-0383.webp',
        'img/grid/20240427-Copa-Cozinha-0800.webp',
        'img/grid/20250724-Forno-da-Saudade-5044.webp',
        'img/grid/20250918-Cafe-Nice-7921.webp',
        'img/grid/20251009-Hacienda-1979-8304.webp',
        'img/grid/20251021-Cozinha-Tupis-8971.webp',
        'img/grid/20251114-Copa-Cozinha-0410.webp',
        'img/grid/Casa-Alvorada-0128.webp',
        'img/grid/enquanto_pochete_envelope_kraft_01.webp',
        'img/grid/paodequeijo_bernardosilva_2024_001.webp'
      ];

      const imageTitles = {
        '20181111-Copa-Cozinha-00006.webp': 'Copa Cozinha',
        '20191009-Curamagoa-7941015.webp': 'Curamágoa',
        '20191204-Cozinha-da-Vo-Ana-0004.webp': 'Cozinha da Vó Ana',
        '20200723-Forno-da-Saudade-0011.webp': 'Forno da Saudade',
        '20210528-Capim-Rosa-4842.webp': 'Capim Rosa',
        '20211126-Capim-Rosa-2656.webp': 'Capim Rosa',
        '20220901-Enquanto0279.webp': 'Enquanto',
        '20230613-Juramento-202-2626.webp': 'Juramento 202',
        '20230807-Tapecaria-Aveia-3258.webp': 'Tapeçaria Aveia',
        '20231006-Distribuidora-Goitacazes-4529.webp': 'Distribuidora Goitacazes',
        '20231207-Cozinha-Tupis-5865.webp': 'Cozinha Tupis',
        '20240228-Casinha-do-Jura.webp': 'Casinha do Jura',
        '20240418-Tapecaria-Aveia-9927.webp': 'Tapeçaria Aveia',
        '20240419-Guaramao-0383.webp': 'Guaramão',
        '20240427-Copa-Cozinha-0800.webp': 'Copa Cozinha',
        '20250724-Forno-da-Saudade-5044.webp': 'Forno da Saudade',
        '20250918-Cafe-Nice-7921.webp': 'Café Nice',
        '20251009-Hacienda-1979-8304.webp': 'Hacienda 1979',
        '20251021-Cozinha-Tupis-8971.webp': 'Cozinha Tupis',
        '20251114-Copa-Cozinha-0410.webp': 'Copa Cozinha',
        'Casa-Alvorada-0128.webp': 'Casa Alvorada',
        'enquanto_pochete_envelope_kraft_01.webp': 'Enquanto',
        'paodequeijo_bernardosilva_2024_001.webp': 'Pão de Queijo'
      };

      const gapValue = () => {
        const value = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--lateral-gap'));
        return Number.isFinite(value) ? value : 2;
      };
      let imageMeta = [];
      let lastLayoutKey = '';
      let lateralAnimationFrame = null;
      let lateralVelocity = 0;
      let lateralSegmentWidths = [];
      let lateralOffsets = [];
      let lateralRowTracks = [];
      let lateralLoopBaseSegment = 4;
      let isHoveringItem = false;

      function getImageFileName(src) {
        return src.split('/').pop();
      }

      function getImageTitle(src) {
        return imageTitles[getImageFileName(src)] || '';
      }

      function renderTitle(title) {
        hoverTitle.replaceChildren();
        title.toLocaleUpperCase('pt-BR').split('').forEach((char) => {
          const span = document.createElement('span');
          span.className = char === ' ' ? 'hover-title__space' : 'hover-title__char';
          span.textContent = char === ' ' ? '' : char;
          hoverTitle.appendChild(span);
        });
      }

      function hideHoverTitle() {
        if (!hoverTitle) return;
        hoverTitle.classList.remove('is-visible');
      }

      function getItemLayoutRect(item) {
        const rowTrack = item.closest('.lateral-row-track');
        if (!rowTrack) return item.getBoundingClientRect();

        const stripRect = stripRows.getBoundingClientRect();
        const rowMatrix = new DOMMatrixReadOnly(getComputedStyle(rowTrack).transform);
        return {
          left: stripRect.left + rowTrack.offsetLeft + rowMatrix.m41 + item.offsetLeft,
          top: stripRect.top + rowTrack.offsetTop + rowMatrix.m42 + item.offsetTop,
          width: item.offsetWidth,
          height: item.offsetHeight
        };
      }

      function showHoverTitle(item, metrics = null) {
        if (!hoverTitle) return;

        const title = getImageTitle(item.dataset.imageSrc || '');
        if (!title) {
          hideHoverTitle();
          return;
        }

        const hoverScale = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hover-scale')) || 1.5;
        const rect = metrics || item.getBoundingClientRect();
        const scaledTop = rect.top - ((rect.height * (hoverScale - 1)) / 2);
        const scaledBottom = rect.top + rect.height + ((rect.height * (hoverScale - 1)) / 2);
        const centerX = rect.left + (rect.width / 2);
        const titleWidth = rect.width * hoverScale;
        const placement = item.dataset.titlePlacement || 'top';
        const top = placement === 'bottom'
          ? Math.min(window.innerHeight - 74, scaledBottom + 13)
          : Math.max(74, scaledTop - 24);

        renderTitle(title);
        hoverTitle.style.left = `${centerX}px`;
        hoverTitle.style.width = `${titleWidth}px`;
        hoverTitle.style.top = `${top}px`;
        hoverTitle.classList.add('is-visible');
      }

      function shuffle(items) {
        const copy = items.slice();
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
        }
        return copy;
      }

      function loadMeta(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve({
            src,
            width: image.naturalWidth,
            height: image.naturalHeight,
            ratio: image.naturalWidth / image.naturalHeight
          });
          image.onerror = reject;
          image.src = src;
        });
      }

      async function ensureMeta() {
        if (imageMeta.length) return imageMeta;
        const results = await Promise.allSettled(stripImages.map((src) => loadMeta(src)));
        imageMeta = results
          .filter((result) => result.status === 'fulfilled')
          .map((result) => result.value);
        return imageMeta;
      }

      function getConfig() {
        if (window.innerWidth <= 640) {
          return { mobile: true };
        }

        return { mobile: false, segmentCopies: 9 };
      }

      function resetLateralState() {
        if (lateralAnimationFrame) {
          cancelAnimationFrame(lateralAnimationFrame);
          lateralAnimationFrame = null;
        }
        lateralVelocity = 0;
        lateralSegmentWidths = [];
        lateralOffsets = [];
        lateralRowTracks = [];
      }

      function createStripItem(imageData, index) {
        const figure = document.createElement('figure');
        const image = document.createElement('img');

        const tileHeight = stripRows.getBoundingClientRect().height || window.innerHeight * 0.25;

        figure.className = 'strip-item';
        figure.style.setProperty('--item-width', `${imageData.ratio * tileHeight}px`);
        figure.dataset.imageSrc = imageData.src;
        image.src = imageData.src;
        image.alt = '';
        image.loading = index < 8 ? 'eager' : 'lazy';
        image.decoding = 'async';
        figure.appendChild(image);
        return figure;
      }

      function measureLateralSegments() {
        if (window.innerWidth <= 640) return;

        lateralRowTracks = Array.from(stripRows.querySelectorAll('.lateral-row-track'));
        lateralSegmentWidths = lateralRowTracks.map((rowTrack) => {
          const segments = rowTrack.querySelectorAll('.lateral-segment');
          if (segments.length < 2) return 0;
          return segments[1].offsetLeft - segments[0].offsetLeft;
        });
        lateralOffsets = lateralSegmentWidths.map((width, index) => {
          const currentOffset = lateralOffsets[index];
          return Number.isFinite(currentOffset) ? currentOffset : 0;
        });
        updateLateralTrackPosition();
      }

      function updateLateralTrackPosition() {
        lateralRowTracks.forEach((rowTrack, index) => {
          const segmentWidth = lateralSegmentWidths[index];
          if (!segmentWidth) return;
          const offset = lateralOffsets[index] || 0;
          const wrappedOffset = ((offset % segmentWidth) + segmentWidth) % segmentWidth;
          rowTrack.style.transform = `translate3d(${-(segmentWidth * lateralLoopBaseSegment) - wrappedOffset}px, 0, 0)`;
        });
      }

      function runLateralScrollLoop() {
        if (lateralAnimationFrame || window.innerWidth <= 640) return;

        const step = () => {
          if (Math.abs(lateralVelocity) < 0.05 || !lateralSegmentWidths.length) {
            lateralAnimationFrame = null;
            return;
          }

          lateralOffsets = lateralOffsets.map((offset) => offset + lateralVelocity);
          updateLateralTrackPosition();
          lateralAnimationFrame = requestAnimationFrame(step);
        };

        lateralAnimationFrame = requestAnimationFrame(step);
      }

      function stopLateralScrollLoop() {
        if (!lateralAnimationFrame) return;
        cancelAnimationFrame(lateralAnimationFrame);
        lateralAnimationFrame = null;
      }

      function resetCenteredHover(rowTrack) {
        const scope = rowTrack || stripRows;
        scope.querySelectorAll('.strip-item').forEach((item) => {
          item.style.transform = '';
          item.style.zIndex = '';
        });
      }

      function applyCenteredHover(item) {
        const rowTrack = item.closest('.lateral-row-track');
        if (!rowTrack) return;

        const items = Array.from(rowTrack.querySelectorAll('.strip-item'));
        const hoveredIndex = items.indexOf(item);
        if (hoveredIndex === -1) return;

        resetCenteredHover(rowTrack);

        const hoverScale = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hover-scale')) || 1.5;
        const itemRect = getItemLayoutRect(item);
        const itemWidth = itemRect.width;
        const offset = (itemWidth * (hoverScale - 1)) / 2;

        items.forEach((currentItem, index) => {
          if (index < hoveredIndex) {
            currentItem.style.transform = `translate3d(${-offset}px, 0, 0)`;
            currentItem.style.zIndex = '1';
          } else if (index > hoveredIndex) {
            currentItem.style.transform = `translate3d(${offset}px, 0, 0)`;
            currentItem.style.zIndex = '1';
          } else {
            currentItem.style.transform = `scale(${hoverScale})`;
            currentItem.style.zIndex = '3';
          }
        });

        showHoverTitle(item, itemRect);
      }

      function bindCenteredHover() {
        stripRows.querySelectorAll('.strip-item').forEach((item) => {
          if (item.dataset.hoverBound === 'true') return;

          item.addEventListener('mouseenter', () => {
            if (window.innerWidth <= 640) return;
            isHoveringItem = true;
            lateralVelocity = 0;
            stopLateralScrollLoop();
            item.dataset.titlePlacement = Math.random() < 0.5 ? 'top' : 'bottom';
            applyCenteredHover(item);
          });

          item.addEventListener('mouseleave', () => {
            if (window.innerWidth <= 640) return;
            isHoveringItem = false;
            const rowTrack = item.closest('.lateral-row-track');
            resetCenteredHover(rowTrack);
            hideHoverTitle();
          });

          item.dataset.hoverBound = 'true';
        });
      }

      function handleLateralMouseMove(event) {
        if (window.innerWidth <= 640) return;
        if (isHoveringItem) return;
        const zoneWidth = Math.max(140, window.innerWidth * 0.16);
        const maxSpeed = 32;
        let velocity = 0;

        if (event.clientX < zoneWidth) {
          const strength = 1 - (event.clientX / zoneWidth);
          velocity = -maxSpeed * strength;
        } else if (event.clientX > window.innerWidth - zoneWidth) {
          const strength = 1 - ((window.innerWidth - event.clientX) / zoneWidth);
          velocity = maxSpeed * strength;
        }

        lateralVelocity = velocity;

        if (velocity === 0) {
          stopLateralScrollLoop();
          return;
        }

        runLateralScrollLoop();
      }

      function handleLateralMouseLeave() {
        isHoveringItem = false;
        resetCenteredHover();
        hideHoverTitle();
        lateralVelocity = 0;
        stopLateralScrollLoop();
      }

      function bindLateralScroll() {
        document.removeEventListener('mousemove', handleLateralMouseMove);
        document.removeEventListener('mouseleave', handleLateralMouseLeave);

        if (window.innerWidth <= 640) {
          lateralVelocity = 0;
          stopLateralScrollLoop();
          return;
        }

        document.addEventListener('mousemove', handleLateralMouseMove);
        document.addEventListener('mouseleave', handleLateralMouseLeave);
      }

      async function renderStrip() {
        const config = getConfig();
        const layoutKey = `${window.innerWidth}x${window.innerHeight}:${config.mobile ? 'mobile' : 'lateral'}`;
        const meta = await ensureMeta();
        const visibleItems = shuffle(meta);
        const fragment = document.createDocumentFragment();
        resetLateralState();
        stripRows.innerHTML = '';

        if (config.mobile) {
          visibleItems.forEach((imageData, index) => {
            fragment.appendChild(createStripItem(imageData, index));
          });
          stripRows.appendChild(fragment);
          bindLateralScroll();
          lastLayoutKey = layoutKey;
          return;
        }

        const lateralTrack = document.createElement('div');
        lateralTrack.className = 'lateral-track';
        const rowTrack = document.createElement('div');
        rowTrack.className = 'lateral-row-track';

        for (let segment = 0; segment < config.segmentCopies; segment += 1) {
          const segmentEl = document.createElement('div');
          segmentEl.className = 'lateral-segment';

          visibleItems.forEach((imageData, index) => {
            const clone = createStripItem(imageData, index);
            clone.dataset.loopSegment = String(segment);
            clone.dataset.loopRow = '0';
            const cloneImage = clone.querySelector('img');
            if (cloneImage) {
              cloneImage.loading = 'eager';
              cloneImage.addEventListener('load', measureLateralSegments, { once: true });
              cloneImage.addEventListener('error', measureLateralSegments, { once: true });
            }
            segmentEl.appendChild(clone);
          });

          rowTrack.appendChild(segmentEl);
        }

        lateralTrack.appendChild(rowTrack);
        fragment.appendChild(lateralTrack);

        stripRows.appendChild(fragment);
        requestAnimationFrame(() => {
          requestAnimationFrame(measureLateralSegments);
        });
        bindLateralScroll();
        bindCenteredHover();
        lastLayoutKey = layoutKey;
      }

      let resizeFrame = 0;

      function handleResize() {
        cancelAnimationFrame(resizeFrame);
        resizeFrame = requestAnimationFrame(() => {
          const config = getConfig();
          const nextLayoutKey = `${window.innerWidth}x${window.innerHeight}:${config.mobile ? 'mobile' : 'lateral'}`;
          if (nextLayoutKey === lastLayoutKey) return;
          renderStrip();
        });
      }

      renderStrip();
      window.addEventListener('resize', handleResize);
    })();
  </script>
</body>
</html>
